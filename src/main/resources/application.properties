# ------------------------------------------------------------
# Cache (Caffeine - in-memory)
# ------------------------------------------------------------
spring.cache.type=caffeine
# Maximum number of entries held in the categories cache
cache.categories.max-size=500
# How long (in seconds) a cached entry lives after the last write
cache.categories.ttl-seconds=300
# Search result cache (shorter TTL — stock/price change more often)
